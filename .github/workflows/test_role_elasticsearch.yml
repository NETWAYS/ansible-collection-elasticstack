---
name: Test Role elasticsearch
on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
          - info
          - warning
          - debug
  pull_request:
    branches:
      - 'feature/**'
      - 'fix/**'
      - '!doc/**'
    paths:
      - 'roles/elasticsearch/**'
      - '.github/workflows/test_role_elasticsearch.yml'
      - 'molecule/elasticsearch_**'

jobs:
  lint_elasticsearch:
    uses: ./.github/workflows/test_linting.yml
    with:
      rolename: elasticsearch

  molecule_elasticsearch:
    needs: lint_elasticsearch
    runs-on: ubuntu-latest

    env:
      COLLECTION_NAMESPACE: netways
      COLLECTION_NAME: elasticstack

    strategy:
      fail-fast: false
      matrix:
        distro:
          - ubuntu2204
        scenario:
          - elasticsearch_default
          - elasticsearch_roles_calculation
          - elasticsearch_cluster-oss
          - elasticsearch_no-security
        release:
          - 8
        ansible_version:
          - "ansible-core>=2.19,<2.20" #Correspond ansible>=12.0,<13.0
        python_version:
          - "3.11"
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python_version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python_version }}

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install "${{ matrix.ansible_version }}"
          python3 -m pip install -r requirements-test.txt

      - name: Install collection
        run: |
          mkdir -p ~/.ansible/collections/ansible_collections/$COLLECTION_NAMESPACE
          cp -a ../ansible-collection-$COLLECTION_NAME ~/.ansible/collections/ansible_collections/$COLLECTION_NAMESPACE/$COLLECTION_NAME

      - name: Test with molecule
        run: |
          ansible --version
          molecule --version
          molecule test -s ${{ matrix.scenario }}
        env:
          MOLECULE_DISTRO: ${{ matrix.distro }}
          ELASTIC_RELEASE: ${{ matrix.release }}
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
