---
# The workaround for arbitrarily named role directory is important because the git repo has one name and the role within it another
# Found at: https://github.com/ansible-community/molecule/issues/1567#issuecomment-436876722
- name: Converge
  collections:
    - netways.elasticstack
  hosts: all
  vars:
    #elasticsearch_security: true # needed for tests of > 7 releases
    elasticstack_full_stack: false
    elasticsearch_jna_workaround: true
    elasticsearch_disable_systemcallfilterchecks: true
    elasticstack_release: "{{ lookup('env', 'ELASTIC_RELEASE') | int}}"
    elasticsearch_heap: "1"
    elasticstack_no_log: false
    # Passwords with arbitrary special characters (space, single quote, $, backtick) to test
    # that they reach the keystore (stdin) and certutil/openssl (argv) without mangling.
    elasticsearch_bootstrap_pw: "Bp'$pa ss`5"
    elasticsearch_tls_key_passphrase: "Es'$ke y`6"
  tasks:
    - name: Include Elastics repos role
      ansible.builtin.include_role:
        name: repos
    - name: Include Elasticsearch
      ansible.builtin.include_role:
        name: elasticsearch
