---
- name: Prepare
  hosts: all
  tasks:
    - name: Show discovered interpreter
      debug:
        var: ansible_facts.discovered_interpreter_python

    - name: Install packages for Debian
      ansible.builtin.apt:
        name:
          - gpg
          - gpg-agent
          - procps
          - curl
          - iproute2
          - git
        update_cache: yes
      when: ansible_os_family == "Debian"
