---
- name: Prepare
  hosts: all
  tasks:
    - name: Show discovered interpreter
      debug:
        var: ansible_facts.discovered_interpreter_python

    - name: Populate apt cache from runner pre-downloaded packages
      ansible.builtin.shell: |
        cp /opt/elastic-apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
      when: ansible_os_family == "Debian"

    - name: Refresh apt cache
      ansible.builtin.apt:
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Install git
      ansible.builtin.package:
        name: git

    - name: Install packages for RHEL
      ansible.builtin.package:
        name:
          - iproute
          - NetworkManager
      when: ansible_os_family == "RedHat"

    - name: Start NetworkManager
      ansible.builtin.service:
        name: NetworkManager
        state: started
        enabled: yes
      when: ansible_os_family == "RedHat"

    - name: Install packages for Debian
      ansible.builtin.package:
        name:
          - gpg
          - gpg-agent
          - procps
          - curl
          - iproute2
      when: ansible_os_family == "Debian"
