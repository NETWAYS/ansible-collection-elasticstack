---
- name: Bootstrap Python 3.9 on Rocky Linux 8
  hosts: all
  gather_facts: false
  tasks:
    - name: Install Python 3.9 if not yet available (Rocky Linux 8)
      ansible.builtin.raw: |
        grep -qs "Rocky Linux release 8" /etc/redhat-release && dnf install -y python39 || true
      changed_when: false

- name: Prepare
  hosts: all
  tasks:
    - name: Install packages for RHEL
      ansible.builtin.package:
        name:
          - iproute
          - NetworkManager
      when: ansible_os_family == "RedHat"

    - name: Start NetworkManager
      ansible.builtin.service:
        name: NetworkManager
        state: started
        enabled: yes
      when: ansible_os_family == "RedHat"

    - name: Install packages for Debian
      ansible.builtin.apt:
        name:
          - gpg
          - gpg-agent
          - procps
          - curl
          - iproute2
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Install common packages
      ansible.builtin.package:
        name:
          - git
          - openssl
          - unzip
          - systemd

# KICS complains about packages being updated.
# In this case, a mere test scenario it is OK, though.

    - name: Update all installed packages RHEL
      ansible.builtin.yum:
        name: '*'
# kics-scan ignore-line
        state: latest
        update_cache: yes
        update_only: yes
      when: ansible_os_family == "RedHat"

    - name: Update all installed packages Debian
      ansible.builtin.apt:
        name: '*'
# kics-scan ignore-line
        state: latest
        update_cache: yes
      when: ansible_os_family == "Debian"
