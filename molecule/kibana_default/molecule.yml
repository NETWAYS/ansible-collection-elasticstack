---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: "kibana_default-${MOLECULE_DISTRO:-debian12}"
    image: "geerlingguy/docker-${MOLECULE_DISTRO:-debian12}-ansible:latest"
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  inventory:
    host_vars:
      kibana_default-rockylinux8:
        ansible_python_interpreter: /usr/bin/python3.9
verifier:
  name: ansible
