---
- name: Prepare
  hosts: all
  tasks:
    - name: Show discovered interpreter
      debug:
        var: ansible_facts.discovered_interpreter_python

    - name: Install packages needed for Debian
      ansible.builtin.apt:
        name:
          - gpg
          - curl
          - procps
          - gpg-agent
          - git
          - iproute2
        update_cache: yes
