---
# The workaround for arbitrarily named role directory is important because the
# git repo has one name and the role
# within it another
# Found at:
# https://github.com/ansible-community/molecule/issues/1567#issuecomment-436876722
- name: Converge
  hosts: all
  collections:
    - netways.elasticstack
  vars:
    logstash_enable: true
    logstash_pipelines:
      - name: syslog
        exclusive: false
        source: https://github.com/NETWAYS/syslog-logstash-pipeline.git
        version: 1183c7544d07487ab24c70213b7172133e9bbb6d
      - name: filebeat
        exclusive: false
        source: https://github.com/NETWAYS/filebeat-logstash-pipeline.git
        version: 97a85f140e0be8d941085b210f7ca9a604088455
      - name: icinga
        exclusive: false
        source: https://github.com/Icinga/icinga-logstash-pipeline.git
        version: master
      - name: forwarder-distribute
        exclusive: false
        input:
          - name: syslog
            key: netways-syslog-output
        output:
          - name: forwarder
            key: forwarder
    logstash_pipeline_identifier_field_name: "[mytest][pipelines]"
    logstash_pipeline_identifier_defaults: true
    logstash_pipeline_unsafe_shutdown: true
    logstash_redis_password: "{{ lookup('ansible.builtin.password', '/tmp/redispassword', chars=['ascii_letters'], length=15) }}"
    redis_requirepass: "{{ logstash_redis_password }}"
    elasticstack_release: "{{ lookup('env', 'ELASTIC_RELEASE') | int}}"
    elasticstack_full_stack: false
    elasticstack_no_log: false
  tasks:
    - name: "Include Elastics repos role"
      ansible.builtin.include_role:
        name: repos
    - name: "Include Redis"
      ansible.builtin.include_role:
        name: geerlingguy.redis
    - name: "Include Logstash"
      ansible.builtin.include_role:
        name: logstash
