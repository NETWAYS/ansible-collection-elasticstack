---
- name: Bootstrap Python 3.9 on Rocky Linux 8
  hosts: all
  gather_facts: false
  tasks:
    - name: Install Python 3.9 if not yet available (Rocky Linux 8)
      ansible.builtin.raw: |
        grep -qs "Rocky Linux release 8" /etc/redhat-release && dnf install -y python39 || true
      changed_when: false

- name: Prepare
  hosts: all
  tasks:
    - name: Install requirements for Debian
      ansible.builtin.apt:
        name:
          - gpg
          - apt-transport-https
        update_cache: yes
      when: ansible_os_family == "Debian"
    - name: Install requirements for Ubuntu
      ansible.builtin.apt:
        name:
          - gpg-agent
        update_cache: yes
      when: ansible_os_family == "Debian" and ansible_distribution == "Ubuntu"
